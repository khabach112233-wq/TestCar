<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Racing Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
 
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
 
<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
 
// CAMERA
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 5, 10);
 
// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
 
// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);
 
// ROAD
const roadGeometry = new THREE.PlaneGeometry(10, 200);
const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
const road = new THREE.Mesh(roadGeometry, roadMaterial);
road.rotation.x = -Math.PI / 2;
scene.add(road);
 
// CAR (player)
const carGeometry = new THREE.BoxGeometry(1,1,2);
const carMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
const car = new THREE.Mesh(carGeometry, carMaterial);
car.position.y = 0.5;
scene.add(car);
 
// OBSTACLES
let obstacles = [];
 
function createObstacle() {
  const geo = new THREE.BoxGeometry(1,1,2);
  const mat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
  const obs = new THREE.Mesh(geo, mat);
  obs.position.set((Math.random()*6 - 3), 0.5, -100);
  scene.add(obs);
  obstacles.push(obs);
}
 
// CONTROLS
let keys = {};
document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);
 
// GAME LOOP
function animate() {
  requestAnimationFrame(animate);
 
  // move car
  if (keys["ArrowLeft"]) car.position.x -= 0.1;
  if (keys["ArrowRight"]) car.position.x += 0.1;
 
  // move road (fake speed)
  road.position.z += 0.5;
  if (road.position.z > 100) road.position.z = 0;
 
  // spawn obstacles
  if (Math.random() < 0.02) createObstacle();
 
  // move obstacles
  obstacles.forEach((obs, index) => {
    obs.position.z += 0.5;
 
    // collision
    if (
      Math.abs(obs.position.x - car.position.x) < 1 &&
      Math.abs(obs.position.z - car.position.z) < 1
    ) {
      alert("Game Over!");
      location.reload();
    }
 
    // remove old obstacle
    if (obs.position.z > 10) {
      scene.remove(obs);
      obstacles.splice(index, 1);
    }
  });
 
  // camera follows car
  camera.position.x = car.position.x;
  camera.lookAt(car.position);
 
  renderer.render(scene, camera);
}
animate();
</script>
 
</body>
</html>
